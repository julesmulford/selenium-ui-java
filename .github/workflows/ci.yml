name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-verify:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn compile test-compile -q

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build-verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Smoke Tests
        run: mvn test -Dgroups=smoke
        env:
          APP_BASE_URL: https://opensource-demo.orangehrmlive.com
          BROWSER_HEADLESS: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-allure-results
          path: target/allure-results/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-screenshots
          path: target/screenshots/

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Regression Tests
        run: mvn test -Dgroups=regression
        env:
          APP_BASE_URL: https://opensource-demo.orangehrmlive.com
          BROWSER_HEADLESS: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-allure-results
          path: target/allure-results/
